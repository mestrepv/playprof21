<text x="84" y="584" fill="#0F6E56" font-size="10">Participantes mobilizam habilidades investigativas (skills)</text>
<text x="64" y="600" fill="#085041" font-size="10">M2</text>
<text x="84" y="600" fill="#0F6E56" font-size="10">Participantes articulam justificativas em decisões (knowledge)</text>
<text x="64" y="616" fill="#085041" font-size="10">M3</text>
<text x="84" y="616" fill="#0F6E56" font-size="10">Participantes negociam sentidos em grupo (values)</text>
<text x="64" y="632" fill="#085041" font-size="10">M4</text>
<text x="84" y="632" fill="#0F6E56" font-size="10">Participantes assumem postura investigativa (identity)</text>
<text x="64" y="648" fill="#085041" font-size="10">M5</text>
<text x="84" y="648" fill="#0F6E56" font-size="10">Transição fluida entre frame ficcional e investigativo (epistemology)</text>
<line x1="350" y1="658" x2="350" y2="680" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ma4)"/>
