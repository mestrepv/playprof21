<!-- ═══ CAMADA 1: Conjectura de alto nível ═══ -->
<rect x="40" y="16" width="620" height="70" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<rect x="56" y="26" width="160" height="20" rx="10" fill="#534AB7"/>
<text x="136" y="36" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="9" font-weight="500">CONJECTURA DE ALTO NÍVEL</text>
<text x="350" y="60" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="11" font-style="italic">"Um RPG Digital estruturado por práticas investigativas autênticas pode operar</text>
<text x="350" y="74" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="11" font-style="italic">como jogo epistêmico e artefato de mediação simbólica em contextos de difusão científica."</text>
<line x1="350" y1="86" x2="350" y2="108" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ma4)"/>
<!-- ═══ CAMADA 2: Incorporação ═══ -->
<rect x="40" y="110" width="620" height="130" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<rect x="56" y="120" width="110" height="20" rx="10" fill="#185FA5"/>
<text x="111" y="130" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="9" font-weight="500">INCORPORAÇÃO</text>
<text x="178" y="130" dominant-baseline="central" fill="#0C447C" font-size="10">Materialização da conjectura em elementos concretos do artefato</text>
