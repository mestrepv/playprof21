<text x="64" y="762" fill="#633806" font-size="9">Incorporação gera processos</text>
<text x="64" y="774" fill="#633806" font-size="9">mediadores esperados</text>
<rect x="254" y="728" width="186" height="60" rx="8" fill="#fff" stroke="#854F0B" stroke-width="0.5" opacity="0.5"/>
<rect x="262" y="734" width="74" height="16" rx="8" fill="#854F0B"/>
<text x="299" y="742" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="9" font-weight="500">REFINADO</text>
<text x="262" y="762" fill="#633806" font-size="9">Funciona sob condições</text>
<text x="262" y="774" fill="#633806" font-size="9">específicas (documentar)</text>
<rect x="452" y="728" width="194" height="60" rx="8" fill="#fff" stroke="#854F0B" stroke-width="0.5" opacity="0.5"/>
<rect x="460" y="734" width="74" height="16" rx="8" fill="#993C1D"/>
<text x="497" y="742" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="9" font-weight="500">REFUTADO</text>
<text x="460" y="762" fill="#633806" font-size="9">Incorporação não gera</text>
<text x="460" y="774" fill="#633806" font-size="9">processos esperados</text>
<text x="16" y="440" text-anchor="middle" dominant-baseline="central" fill="#b4b2a9" font-size="9" transform="rotate(-90 16 440)">Rastreabilidade: teoria → incorporação → conjectura → processo → evidência</text>
