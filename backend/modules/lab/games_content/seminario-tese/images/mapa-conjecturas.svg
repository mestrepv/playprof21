<rect x="56" y="156" width="186" height="70" rx="8" fill="#fff" stroke="#185FA5" stroke-width="0.5" opacity="0.6"/>
<rect x="64" y="162" width="60" height="16" rx="8" fill="#185FA5" opacity="0.8"/>
<text x="94" y="170" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">primária</text>
<text x="64" y="188" fill="#0C447C" font-size="10" font-weight="500">Estrutura de Tarefa</text>
<text x="64" y="202" fill="#185FA5" font-size="9">Missões por práticas</text>
<text x="64" y="214" fill="#185FA5" font-size="9">investigativas + epistemic frames</text>
<rect x="254" y="156" width="186" height="70" rx="8" fill="#fff" stroke="#185FA5" stroke-width="0.5" opacity="0.6"/>
<rect x="262" y="162" width="54" height="16" rx="8" fill="#185FA5" opacity="0.5"/>
<text x="289" y="170" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">suporte</text>
<text x="262" y="188" fill="#0C447C" font-size="10" font-weight="500">Ferramentas e Materiais</text>
<text x="262" y="202" fill="#185FA5" font-size="9">Simuladores, feedbacks,</text>
<text x="262" y="214" fill="#185FA5" font-size="9">narrativa ficcional</text>
<rect x="452" y="156" width="194" height="70" rx="8" fill="#fff" stroke="#185FA5" stroke-width="0.5" opacity="0.6"/>
<rect x="460" y="162" width="54" height="16" rx="8" fill="#185FA5" opacity="0.5"/>
<text x="487" y="170" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">suporte</text>
<text x="460" y="188" fill="#0C447C" font-size="10" font-weight="500">Estrutura de Participação</text>
<text x="460" y="202" fill="#185FA5" font-size="9">Mecânicas de cooperação,</text>
<text x="460" y="214" fill="#185FA5" font-size="9">consenso grupal</text>
