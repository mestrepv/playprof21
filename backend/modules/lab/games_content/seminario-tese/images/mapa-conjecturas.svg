<!-- ═══ CAMADA 3: Conjecturas de Design ═══ -->
<rect x="40" y="264" width="620" height="240" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<rect x="56" y="274" width="150" height="20" rx="10" fill="#993C1D"/>
<text x="131" y="284" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="9" font-weight="500">CONJECTURAS DE DESIGN</text>
<text x="218" y="284" dominant-baseline="central" fill="#712B13" font-size="10">"Se [incorporação], então [processo mediador] emergirá"</text>
<line x1="56" y1="302" x2="646" y2="302" stroke="#993C1D" stroke-width="0.5" opacity="0.15"/>
<rect x="56" y="310" width="296" height="56" rx="6" fill="#fff" stroke="#993C1D" stroke-width="0.5" opacity="0.5"/>
<rect x="62" y="316" width="32" height="14" rx="7" fill="#993C1D" opacity="0.7"/>
<text x="78" y="323" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">PD1</text>
<text x="100" y="323" dominant-baseline="central" fill="#712B13" font-size="9" font-weight="500">NdC como construção humana</text>
<text x="62" y="342" fill="#993C1D" font-size="9">Se missões apresentam ciência como processo →</text>
<text x="62" y="354" fill="#993C1D" font-size="9">participantes questionam visões absolutistas</text>
<rect x="364" y="310" width="282" height="56" rx="6" fill="#fff" stroke="#993C1D" stroke-width="0.5" opacity="0.5"/>
<rect x="370" y="316" width="32" height="14" rx="7" fill="#993C1D" opacity="0.7"/>
<text x="386" y="323" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">PD2</text>
<text x="408" y="323" dominant-baseline="central" fill="#712B13" font-size="9" font-weight="500">Prática investigativa</text>
<text x="370" y="342" fill="#993C1D" font-size="9">Se missões usam dados reais do LHC →</text>
<text x="370" y="354" fill="#993C1D" font-size="9">participantes mobilizam skills investigativas</text>
<rect x="56" y="374" width="296" height="56" rx="6" fill="#fff" stroke="#993C1D" stroke-width="0.5" opacity="0.5"/>
<rect x="62" y="380" width="32" height="14" rx="7" fill="#993C1D" opacity="0.7"/>
<text x="78" y="387" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">PD3</text>
<text x="100" y="387" dominant-baseline="central" fill="#712B13" font-size="9" font-weight="500">Ficção científica como contexto</text>
<text x="62" y="406" fill="#993C1D" font-size="9">Se narrativa envolve sem substituir →</text>
<text x="62" y="418" fill="#993C1D" font-size="9">transição fluida entre frames sem perda de rigor</text>
<rect x="364" y="374" width="282" height="56" rx="6" fill="#fff" stroke="#993C1D" stroke-width="0.5" opacity="0.5"/>
<rect x="370" y="380" width="32" height="14" rx="7" fill="#993C1D" opacity="0.7"/>
<text x="386" y="387" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">PD4</text>
<text x="408" y="387" dominant-baseline="central" fill="#712B13" font-size="9" font-weight="500">Cooperação e argumentação</text>
<text x="370" y="406" fill="#993C1D" font-size="9">Se mecânicas exigem consenso grupal →</text>
<text x="370" y="418" fill="#993C1D" font-size="9">participantes negociam sentidos coletivamente</text>
<rect x="56" y="438" width="296" height="56" rx="6" fill="#fff" stroke="#993C1D" stroke-width="0.5" opacity="0.5"/>
<rect x="62" y="444" width="32" height="14" rx="7" fill="#993C1D" opacity="0.7"/>
<text x="78" y="451" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">PD5</text>
<text x="100" y="451" dominant-baseline="central" fill="#712B13" font-size="9" font-weight="500">Erro como recurso epistêmico</text>
<text x="62" y="470" fill="#993C1D" font-size="9">Se feedback trata erro como informação →</text>
<text x="62" y="482" fill="#993C1D" font-size="9">participantes revisam hipóteses sem abandono</text>
<rect x="364" y="438" width="282" height="56" rx="6" fill="#fff" stroke="#993C1D" stroke-width="0.5" opacity="0.5"/>
<rect x="370" y="444" width="32" height="14" rx="7" fill="#993C1D" opacity="0.7"/>
<text x="386" y="451" text-anchor="middle" dominant-baseline="central" fill="#fff" font-size="8" font-weight="500">PD6</text>
<text x="408" y="451" dominant-baseline="central" fill="#712B13" font-size="9" font-weight="500">Modelagem dos fenômenos</text>
<text x="370" y="470" fill="#993C1D" font-size="9">Se tarefas exigem construir representações →</text>
<text x="370" y="482" fill="#993C1D" font-size="9">participantes produzem modelos explicativos</text>
<line x1="350" y1="504" x2="350" y2="526" stroke="#9c9a92" stroke-width="1.2" marker-end="url(#ma4)"/>
<!-- ═══ CAMADA 4: Processos Mediadores ═══ -->
<rect x="40" y="528" width="620" height="130" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<rect x="56" y="538" width="150" height="20" rx="10" fill="#0F6E56"/>
