<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" width="220" height="180">
<style>
@keyframes beamL { 0%{transform:translateX(-80px);opacity:0} 40%{opacity:1} 50%{transform:translateX(0);opacity:1} 51%{opacity:0} 100%{opacity:0} }
@keyframes beamR { 0%{transform:translateX(80px);opacity:0}  40%{opacity:1} 50%{transform:translateX(0);opacity:1} 51%{opacity:0} 100%{opacity:0} }
@keyframes burst { 0%,49%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(0)} 70%{opacity:.8;transform:scale(1)} 100%{opacity:0;transform:scale(1.6)} }
@keyframes spark1 { 0%,49%{opacity:0} 50%{opacity:1;transform:translate(0,0)}   100%{opacity:0;transform:translate(28px,-22px)} }
@keyframes spark2 { 0%,49%{opacity:0} 50%{opacity:1;transform:translate(0,0)}   100%{opacity:0;transform:translate(-24px,-26px)} }
@keyframes spark3 { 0%,49%{opacity:0} 50%{opacity:1;transform:translate(0,0)}   100%{opacity:0;transform:translate(30px,18px)} }
@keyframes spark4 { 0%,49%{opacity:0} 50%{opacity:1;transform:translate(0,0)}   100%{opacity:0;transform:translate(-20px,24px)} }
@keyframes spark5 { 0%,49%{opacity:0} 50%{opacity:1;transform:translate(0,0)}   100%{opacity:0;transform:translate(-8px,-32px)} }
@keyframes spark6 { 0%,49%{opacity:0} 50%{opacity:1;transform:translate(0,0)}   100%{opacity:0;transform:translate(14px,28px)} }
.beamL    { animation: beamL  2.5s ease-in-out infinite; }
.beamR    { animation: beamR  2.5s ease-in-out infinite; }
.burst    { animation: burst  2.5s ease-out        infinite; transform-origin: 110px 90px; }
.burst-lg { animation: burst  2.5s ease-out        infinite .05s; transform-origin: 110px 90px; }
.spark1   { animation: spark1 2.5s ease-out        infinite; transform-origin: 110px 90px; }
.spark2   { animation: spark2 2.5s ease-out        infinite; transform-origin: 110px 90px; }
.spark3   { animation: spark3 2.5s ease-out        infinite; transform-origin: 110px 90px; }
.spark4   { animation: spark4 2.5s ease-out        infinite; transform-origin: 110px 90px; }
.spark5   { animation: spark5 2.5s ease-out        infinite; transform-origin: 110px 90px; }
.spark6   { animation: spark6 2.5s ease-out        infinite; transform-origin: 110px 90px; }
</style>

<circle cx="110" cy="90" r="70" fill="none" stroke="#534AB7" stroke-width="0.5" opacity="0.2"/>
<circle cx="110" cy="90" r="55" fill="none" stroke="#534AB7" stroke-width="0.5" opacity="0.15"/>
<circle cx="110" cy="90" r="40" fill="none" stroke="#0F6E56" stroke-width="0.5" opacity="0.2"/>
<line x1="40" y1="90" x2="180" y2="90" stroke="#534AB7" stroke-width="0.3" opacity="0.15"/>
<rect x="36" y="20" width="4" height="140" rx="2" fill="#534AB7" opacity="0.12"/>
<rect x="180" y="20" width="4" height="140" rx="2" fill="#534AB7" opacity="0.12"/>
<rect x="24" y="36" width="6" height="108" rx="3" fill="#534AB7" opacity="0.08"/>
<rect x="190" y="36" width="6" height="108" rx="3" fill="#534AB7" opacity="0.08"/>
<line x1="38" y1="30" x2="110" y2="70" stroke="#534AB7" stroke-width="0.3" opacity="0.1"/>
<line x1="38" y1="150" x2="110" y2="110" stroke="#534AB7" stroke-width="0.3" opacity="0.1"/>
<line x1="182" y1="30" x2="110" y2="70" stroke="#534AB7" stroke-width="0.3" opacity="0.1"/>
<line x1="182" y1="150" x2="110" y2="110" stroke="#534AB7" stroke-width="0.3" opacity="0.1"/>

<g class="beamL">
  <circle cx="110" cy="90" r="4" fill="#D85A30"/>
  <circle cx="110" cy="90" r="2" fill="#F0997B"/>
</g>
<g class="beamR">
  <circle cx="110" cy="90" r="4" fill="#185FA5"/>
  <circle cx="110" cy="90" r="2" fill="#85B7EB"/>
</g>

<circle class="burst"    cx="110" cy="90" r="12" fill="#FAEEDA"/>
<circle class="burst-lg" cx="110" cy="90" r="6"  fill="#EF9F27"/>

<circle class="spark1" cx="110" cy="90" r="2"   fill="#0F6E56"/>
<circle class="spark2" cx="110" cy="90" r="1.5" fill="#534AB7"/>
<circle class="spark3" cx="110" cy="90" r="2"   fill="#D85A30"/>
<circle class="spark4" cx="110" cy="90" r="1.5" fill="#185FA5"/>
<circle class="spark5" cx="110" cy="90" r="1.8" fill="#854F0B"/>
<circle class="spark6" cx="110" cy="90" r="1.5" fill="#993556"/>

<text x="110" y="172" text-anchor="middle" font-size="11" font-weight="500" fill="#534AB7" opacity="0.7">ATLAS · LHC · CERN</text>
</svg>
