<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seminário de Tese — Paulo Vicente</title>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Söhne,'Anthropic Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#12121f;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100vw;height:100vh;overflow:hidden}
.wrap{width:960px;height:540px;background:#fafaf7;display:flex;flex-direction:column;position:relative;border-radius:6px;box-shadow:0 20px 80px rgba(0,0,0,.65),0 4px 16px rgba(0,0,0,.3);transform-origin:center center;cursor:pointer;user-select:none;flex-shrink:0}
.dots{background-image:radial-gradient(#d3d1c7 .6px,transparent .6px);background-size:22px 22px;position:absolute;inset:0;opacity:.22;pointer-events:none;border-radius:6px}
.content{flex:1;padding:26px 36px 10px;position:relative;z-index:1;animation:fadeIn .35s ease;overflow-y:auto;overflow-x:hidden}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:#d3d1c7;border-radius:2px}
.nav{padding:6px 28px 8px;position:relative;z-index:1;border-top:1px solid #e8e6e0;background:rgba(250,250,247,.97);border-radius:0 0 6px 6px}
.pills{display:flex;gap:4px;justify-content:center;margin-bottom:5px}
.pill{height:5px;border-radius:3px;transition:all .3s;cursor:pointer}
.info{display:flex;justify-content:center;align-items:center;gap:16px;font-size:10.5px;color:#9c9a92}
.hint{animation:pulse 2s ease infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:.7}50%{opacity:.25}}
.tag{display:inline-block;padding:2px 10px;border-radius:6px;font-size:12px;font-weight:500}
.card{border-radius:10px;padding:14px 18px;margin-bottom:0}
.card-title{font-weight:500;font-size:15px;margin-bottom:6px}
.card-body{font-size:13.5px;line-height:1.6}
.bullet{display:flex;gap:8px;margin-bottom:6px;font-size:13.5px;line-height:1.55}
.bullet::before{content:'•';margin-top:2px;flex-shrink:0}
h2{font-size:20px;font-weight:500;color:#2C2C2A;margin:10px 0 12px}
table{width:100%;border-collapse:collapse;font-size:12px;line-height:1.5}
th{padding:6px 6px;text-align:left;color:#444441;font-weight:500}
td{padding:5px 6px;color:#444441}
thead tr{border-bottom:2px solid #d3d1c7}
tbody tr{border-bottom:1px solid #e8e6e0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.layer{transition:opacity .6s ease,transform .6s ease}
.layer-hidden{opacity:0;transform:translateY(6px)}
#progress-bar{position:absolute;top:0;left:0;height:3px;z-index:10;border-radius:0 3px 3px 0;background:#534AB7;width:0%;transition:width .4s ease;pointer-events:none}
#slide-number{margin-left:auto;font-size:10.5px;color:#9c9a92;opacity:.7}
#grid-view{position:absolute;inset:0;z-index:20;background:rgba(250,250,247,0.97);border-radius:6px;display:none;grid-template-columns:repeat(5,1fr);gap:8px;padding:16px;overflow-y:auto;align-content:start}
#grid-view .gc{border:1px solid #d3d1c7;border-radius:4px;padding:6px;font-size:9px;color:#444441;line-height:1.3;cursor:pointer;min-height:80px;background:#fff;overflow:hidden}
#grid-view .gc.active{border-color:#534AB7;background:#EEEDFE}
#shortcuts-overlay{position:absolute;inset:0;z-index:25;background:rgba(18,18,31,0.85);border-radius:6px;display:none;align-items:center;justify-content:center}
.so-box{background:#fafaf7;border-radius:12px;padding:28px 36px;max-width:360px;width:100%}
.so-box h3{font-size:16px;font-weight:500;color:#2C2C2A;margin-bottom:16px}
.so-grid{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13px;color:#5F5E5A;align-items:center}
.so-key{background:#F1EFE8;padding:2px 8px;border-radius:4px;font-family:monospace;font-size:12px;color:#444441;white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <div id="progress-bar"></div>
  <div class="dots"></div>
  <div class="content" id="slide"></div>
  <div id="grid-view"></div>
  <div id="shortcuts-overlay">
    <div class="so-box">
      <h3>Atalhos do teclado</h3>
      <div class="so-grid">
        <span class="so-key">→ / Espaço / Enter</span><span>Próximo slide</span>
        <span class="so-key">← / Backspace</span><span>Slide anterior</span>
        <span class="so-key">F</span><span>Tela cheia</span>
        <span class="so-key">R</span><span>Voltar ao início</span>
        <span class="so-key">G</span><span>Grade de slides</span>
        <span class="so-key">?</span><span>Este painel</span>
      </div>
    </div>
  </div>
  <div class="nav">
    <div class="pills" id="pills"></div>
    <div class="info">
      <span id="counter">0/18</span>
      <span id="hint" class="hint">clique ou seta →</span>
      <span style="opacity:.5">· F · G · ?</span>
      <span id="slide-number">1 / 19</span>
    </div>
  </div>
</div>

<script>

// ── Paleta de cores ──────────────────────────────────────────────────────────
var P = {
  purple: {bg:'#EEEDFE', border:'#534AB7', title:'#3C3489', text:'#534AB7'},
  teal:   {bg:'#E1F5EE', border:'#0F6E56', title:'#085041', text:'#0F6E56'},
  coral:  {bg:'#FAECE7', border:'#993C1D', title:'#712B13', text:'#993C1D'},
  amber:  {bg:'#FAEEDA', border:'#854F0B', title:'#633806', text:'#854F0B'},
  blue:   {bg:'#E6F1FB', border:'#185FA5', title:'#0C447C', text:'#185FA5'},
  gray:   {bg:'#F1EFE8', border:'#888780', title:'#444441', text:'#5F5E5A'}
};

// ── Helpers de componente ────────────────────────────────────────────────────
function tag(c, t) {
  return `<span class="tag" style="background:${P[c].bg};color:${P[c].title};border:1px solid ${P[c].border}">${t}</span>`;
}
// cardv: título em cima, corpo em baixo (layout vertical — padrão)
function cardv(c, title, body, extra) {
  return `<div class="card" style="background:${P[c].bg};border:1px solid ${P[c].border};${extra||''}">
    <div class="card-title" style="color:${P[c].title}">${title}</div>
    <div class="card-body" style="color:${P[c].text}">${body}</div>
  </div>`;
}
// cardh: título à esquerda, corpo à direita (layout horizontal)
function cardh(c, title, body, extra) {
  return `<div class="card" style="background:${P[c].bg};border:1px solid ${P[c].border};display:flex;flex-direction:row;gap:12px;align-items:flex-start;${extra||''}">
    <div class="card-title" style="color:${P[c].title};min-width:160px;flex-shrink:0">${title}</div>
    <div class="card-body" style="color:${P[c].text}">${body}</div>
  </div>`;
}
// alias legado
function card(c, title, body, extra) { return cardv(c, title, body, extra); }
function bullet(t, c) {
  return `<div class="bullet" style="color:${c||'#5F5E5A'}">${t}</div>`;
}

// ── Diagrama da Pesquisa-Aplicação (SVG em 3 camadas) ───────────────────────
function dbrSVG(layer) {
  function vis(n) {
    return `opacity:${layer>=n?1:0};transition:opacity .6s ease,transform .6s ease;${layer>=n?'':'transform:translateY(6px)'}`;
  }
  return `
<svg viewBox="0 0 700 650" style="width:auto;height:auto;max-width:560px;max-height:390px;display:block;margin:0 auto">
<defs>
  <marker id="ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Camada 1: Fundamento epistemológico + Fases da Pesquisa-Aplicação -->
<g style="${vis(1)}">
  <rect x="80" y="20" width="540" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="350" y="39" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="13" font-weight="500">Fundamento epistemológico</text>
  <text x="350" y="56" text-anchor="middle" dominant-baseline="central" fill="#534AB7" font-size="11">Socioconstrutivismo (Vygotsky) + mediação simbólica</text>
  <line x1="350" y1="70" x2="350" y2="88" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ma)"/>

  <rect x="80" y="90" width="540" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="350" y="109" text-anchor="middle" dominant-baseline="central" fill="#3C3489" font-size="13" font-weight="500">Matriz de design cognitivo (Matta)</text>
  <text x="350" y="126" text-anchor="middle" dominant-baseline="central" fill="#534AB7" font-size="11">Soluções cognitivas + soluções técnicas</text>
  <line x1="350" y1="140" x2="350" y2="162" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ma)"/>

  <rect x="200" y="164" width="300" height="330" rx="12" fill="none" stroke="#c8c6be" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="350" y="182" text-anchor="middle" fill="#73726c" font-size="10">Fases da Pesquisa-Aplicação (Matta; Silva; Boaventura, 2014)</text>

  <rect x="218" y="196" width="260" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="348" y="215" text-anchor="middle" dominant-baseline="central" fill="#085041" font-size="13" font-weight="500">Fase 1 — Diagnóstico</text>
  <text x="348" y="233" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="11">Co-construção com a comunidade</text>
  <line x1="348" y1="246" x2="348" y2="262" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ma)"/>

  <rect x="218" y="264" width="260" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="348" y="283" text-anchor="middle" dominant-baseline="central" fill="#085041" font-size="13" font-weight="500">Fase 2 — Prototipagem</text>
  <text x="348" y="301" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="11">Ciclos de design exploratório</text>
  <line x1="348" y1="314" x2="348" y2="330" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ma)"/>

  <rect x="218" y="332" width="260" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="348" y="351" text-anchor="middle" dominant-baseline="central" fill="#085041" font-size="13" font-weight="500">Fase 3 — Implementação</text>
  <text x="348" y="369" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="11">Ciclos iterativos + refinamento</text>
  <path d="M478 360 L496 360 L496 289 L478 289" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#ma)"/>
  <text x="503" y="328" fill="#0F6E56" font-size="12" dominant-baseline="central">↻</text>
  <line x1="348" y1="382" x2="348" y2="398" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ma)"/>

  <rect x="218" y="400" width="260" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="348" y="419" text-anchor="middle" dominant-baseline="central" fill="#085041" font-size="13" font-weight="500">Fase 4 — Sistematização</text>
  <text x="348" y="437" text-anchor="middle" dominant-baseline="central" fill="#0F6E56" font-size="11">Princípios validados + teoria</text>
</g>

<!-- Camada 2: Contexto sócio-histórico e comunidade de prática -->
<g style="${vis(2)}">
  <rect x="32" y="196" width="148" height="254" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="106" y="274" text-anchor="middle" dominant-baseline="central" fill="#0C447C" font-size="13" font-weight="500">Contexto</text>
  <text x="106" y="294" text-anchor="middle" dominant-baseline="central" fill="#0C447C" font-size="13" font-weight="500">sócio-histórico</text>
  <text x="106" y="316" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-size="11">e institucional</text>
  <text x="106" y="354" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-size="10">Gera o problema</text>
  <text x="106" y="370" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-size="10">Restringe soluções</text>
  <text x="106" y="386" text-anchor="middle" dominant-baseline="central" fill="#185FA5" font-size="10">Habilita o design</text>
  <line x1="180" y1="220" x2="198" y2="220" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>
  <line x1="180" y1="289" x2="198" y2="289" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>
  <line x1="180" y1="357" x2="198" y2="357" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>
  <line x1="180" y1="425" x2="198" y2="425" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>

  <rect x="520" y="196" width="148" height="254" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="594" y="274" text-anchor="middle" dominant-baseline="central" fill="#712B13" font-size="13" font-weight="500">Comunidade</text>
  <text x="594" y="294" text-anchor="middle" dominant-baseline="central" fill="#712B13" font-size="13" font-weight="500">de prática</text>
  <text x="594" y="316" text-anchor="middle" dominant-baseline="central" fill="#993C1D" font-size="11">(Wenger, 1998)</text>
  <text x="594" y="354" text-anchor="middle" dominant-baseline="central" fill="#993C1D" font-size="10">Co-designers</text>
  <text x="594" y="370" text-anchor="middle" dominant-baseline="central" fill="#993C1D" font-size="10">Validadores</text>
  <text x="594" y="386" text-anchor="middle" dominant-baseline="central" fill="#993C1D" font-size="10">Facilitadores</text>
  <line x1="518" y1="220" x2="502" y2="220" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>
  <line x1="518" y1="289" x2="502" y2="289" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>
  <line x1="518" y1="357" x2="502" y2="357" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>
  <line x1="518" y1="425" x2="502" y2="425" stroke="#D85A30" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#ma)"/>
</g>

<!-- Camada 3: Princípios de design validados e rastreabilidade -->
<g style="${vis(3)}">
  <line x1="350" y1="494" x2="350" y2="530" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#ma)"/>
  <rect x="80" y="532" width="540" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="350" y="551" text-anchor="middle" dominant-baseline="central" fill="#633806" font-size="13" font-weight="500">Princípios de design validados</text>
  <text x="350" y="569" text-anchor="middle" dominant-baseline="central" fill="#854F0B" font-size="11">Contexto-específico → domínio → genérico</text>
  <text x="18" y="370" text-anchor="middle" dominant-baseline="central" fill="#b4b2a9" font-size="10" transform="rotate(-90 18 370)">Rastreabilidade teoria ↔ design ↔ evidência</text>
  <line x1="26" y1="220" x2="26" y2="520" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 4"/>
</g>
</svg>`;
}

// ── Metadados de navegação ───────────────────────────────────────────────────
var SECTIONS = [
  '',                       // 0  título
  'Contextualização',       // 1
  'Contextualização',       // 2
  'Contextualização',       // 3
  'Contextualização',       // 4
  'Questão norteadora',     // 5
  'Objetivos',              // 6
  'Justificativa',          // 7
  'Percurso metodológico',  // 8
  'Percurso metodológico',  // 9
  'Artigos da tese',        // 10
  'Artigos da tese',        // 11
  'Artigos da tese',        // 12
  'Artigos da tese',        // 13
  'Cronograma',             // 14
  'Referências'             // 15
];
var TITLES = [
  'Título', 'FP na sociedade (contexto)', 'LHC em ação', 'Eixo 1: Domínio', 'Eixo 2: Metodologia',
  'Questão norteadora', 'Objetivos', 'Justificativa', 'Metodologia',
  'Diagrama DBR',
  '3 artigos', 'Art. 1', 'Art. 2', 'Art. 3', 'Cronograma', 'Referências'
];

// ════════════════════════════════════════════════════════════════════════════
// SLIDES — uma função nomeada por slide
// ════════════════════════════════════════════════════════════════════════════

function slideTitle() {
  return `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;text-align:center;gap:16px">
      ${tag('purple','PPGDC - Programa de Pós-Graduação em Difusão do Conhecimento')}
      <div style="font-size:13px;color:#6B6B6B;margin-top:-8px">UFBA/UNEB/IFBA/SENAI-CIMATEC/LNCC</div>
      <div style="width:60px;height:4px;background:#534AB7;border-radius:2px;margin:0 auto 4px"></div>
      <h1 style="font-size:24px;font-weight:500;color:#2C2C2A;max-width:560px;line-height:1.4">
        Princípios de Design para Jogos Epistêmicos na Difusão do Conhecimento em Física de Partículas
      </h1>
      <h2>Linha 2: Difusão do Conhecimento – Informação, Comunicação e Gestão</h2>
      <div style="font-size:14px;color:#5F5E5A">Paulo Vicente Moreira dos Santos</div>
      <div style="font-size:12px;color:#888780">Matrícula IFBA · 20251600014</div>
    </div>
  `;
}

function slideContexto1() {
  return `
    ${tag('blue','Contextualização')}
    <h2>Contextualização — Eixo 1: Domínio</h2>
    <p style="font-size:12px;color:#888780;margin-bottom:14px">Física de Partículas na educação básica</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${cardv('blue','SOUZA, R. S. Análise das contribuições da escola de física CERN no contexto do ensino médio (2010–2022). Revista Brasileira de Ensino de Física, v. 45, 2023 — RBEF, Qualis A1',
        'Mapeia produção sobre ensino de Física de Partículas no Brasil. Identifica ausência de fundamentação teórica, uso marginal de jogos, falta de princípios de design.<br><br><strong>Proximidade:</strong> mesmo domínio e ecossistema.<br><br><strong>Distância:</strong> mapeamento descritivo — esta pesquisa preenche as lacunas.')}
      ${cardv('blue','WIENER, G. J. Elementary particle physics in early physics education. Tese — Univ. Wien, 2017',
        'Física de Partículas para crianças de 12 anos: Os conceitos são acessíveis quando o meio de mediação é adequado. Representações tipográficas reduziram concepções alternativas.<br><br><strong>Argumento-chave:</strong> o obstáculo não é cognitivo — é de mediação. Metodologia Design Based Research<br><br><strong>Distância:</strong> ensino formal, representações estáticas, sem jogos, sem difusão.')}
    </div>
  `;
}

function slideContexto2() {
  return `
    ${tag('blue','Contextualização')}
    <h2>Contextualização — Eixo 2: Metodologia e teoria</h2>
    <p style="font-size:12px;color:#888780;margin-bottom:14px">DBR e jogos epistêmicos em ciências</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${cardv('teal','HAAGEN-SCHÜTZENHÖFER, C.; HOPF, M. Design-Based Research as a Model for Systematic Curriculum Development: The Example of a Curriculum for Introductory Optics. Physical Review Physics Education Research, v. 16, n. 2, 2020',
        '6 anos de DBR em óptica. Tradução regrada teoria → princípios de design. Crítica: tradução permanece nebulosa.<br><strong>Proximidade:</strong> DBR em ensino de Física com princípios explícitos.<br><strong>Distância:</strong> curricular formal; esta pesquisa opera em difusão não formal com conjecture mapping.<br><em>Nota: Hopf orientou Wiener (2017) — mesmo grupo de Viena.</em>')}
      ${cardv('teal','ZAMBRANO, Andres Felipe et al. Unlocking gameplay insights with epistemic (ordered) network analysis: understanding the potential of video games to foster authentic scientific practices in STEM education. Journal of Science Education and Technology, v. 34, n. 5, p. 1164-1177, 2025.',
        'Crystal Island: jogo investigativo (microbiologia) com 122 estudantes como cientistas. ONA + clustering → 4 arquétipos. Framework de Shaffer (2006) vivo.<br><strong>Proximidade:</strong> jogo epistêmico + práticas científicas autênticas + logs + populações sub-representadas.<br><strong>Distância:</strong> single-player, sem princípios a priori, sem DBR iterativa.')}
    </div>
  `;
}

function slideQuestao() {
  return `
    ${tag('purple','Questão norteadora')}
    <h2>Questão norteadora</h2>
    <div style="background:#F1EFE8;border-left:3px solid #534AB7;padding:14px 18px;border-radius:0 8px 8px 0;font-size:13px;color:#2C2C2A;line-height:1.65;margin-bottom:16px">
      Que <strong>princípios de design</strong>, fundamentados na Natureza da Ciência (NdC) e validados por ciclos iterativos de Pesquisa-Aplicação com uma comunidade de prática, devem orientar a construção de um <strong>RPG Digital concebido como jogo epistêmico</strong> para a <strong>difusão do conhecimento em Física de Partículas</strong> junto a estudantes do Ensino Médio?
    </div>

    <div style="background:#F7F6FF;border:1px solid #C4BFF0;border-radius:10px;padding:14px 20px;margin:14px 0;font-size:13px;color:#2C2C2A;line-height:1.75">

      <span style="display:block;margin-top:6px"><span style="color:#534AB7;font-weight:500">então</span> a intervenção <span style="color:#534AB7">(X)</span> deve ser concebida como <em>solução situada</em>, dotada de</span>
      <ul style="margin:6px 0 6px 18px;padding:0;list-style:none;display:flex;flex-direction:column;gap:3px">
        <li style="display:flex;gap:8px"><span style="color:#534AB7;flex-shrink:0">→</span> características de design <span style="color:#534AB7;margin-left:4px">(A, B, C)</span></li>

      </ul>
      <span style="color:#534AB7;font-style:italic">validados na e pela prática.</span>
    </div>

    <div style="font-size:11px;color:#888780;margin-top:8px">Adaptado do formato heurístico de Van den Akker (1999)</div>
  `;
}

function slideCronograma() {
  var sem = ['25/1','25/2','26/1','26/2','27/1','27/2','28/1','28/2'];
  var W = 62.5; // width per semester
  var X0 = 160; // left edge of first semester
  var Y0 = 56;  // top of first bar
  var H = 16;   // bar height
  var G = 30;   // gap between rows

  var rows = [
    {label:'Disciplinas',          s:0, e:2, color:'teal'},
    {label:'Art. 1 (rev.+diag.)',  s:1, e:3, color:'purple'},
    {label:'CDE — Fase 2',        s:1, e:3, color:'teal'},
    {label:'CDC+EVE — Fase 3',     s:2, e:4, color:'teal'},
    {label:'Qualificação',         s:4, e:4, color:'gray'},
    {label:'Art. 2 (ciclos)',      s:4, e:5, color:'purple'},
    {label:'Art. 3 (princípios)',  s:5, e:6, color:'purple'},
    {label:'Redação integradora',  s:5, e:7, color:'gray', dim:true},
    {label:'Defesa',               s:7, e:7, color:'amber', diamond:true}
  ];

  var svgH = Y0 + rows.length * G + 20;

  var gridLines = sem.map(function(_, i) {
    var x = X0 + i * W;
    return '<line x1="'+x+'" y1="38" x2="'+x+'" y2="'+(svgH-10)+'" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>';
  }).join('');
  // right edge
  gridLines += '<line x1="'+(X0+8*W)+'" y1="38" x2="'+(X0+8*W)+'" y2="'+(svgH-10)+'" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.4"/>';

  var semLabels = sem.map(function(s, i) {
    var cx = X0 + i * W + W/2;
    return '<text x="'+cx+'" y="28" text-anchor="middle" dominant-baseline="central" fill="#888780" font-size="11" font-weight="500">'+s+'</text>';
  }).join('');

  var bars = rows.map(function(r, i) {
    var y = Y0 + i * G;
    var c = P[r.color];
    var labelEl = '<text x="148" y="'+(y+H/2)+'" text-anchor="end" dominant-baseline="central" fill="#444441" font-size="11"'+(r.diamond?' font-weight="500"':'')+'>'+r.label+'</text>';

    if (r.diamond) {
      var cx = X0 + r.s * W + W/2;
      var cy = y + H/2;
      return labelEl + '<polygon points="'+cx+','+(cy-9)+' '+(cx+9)+','+cy+' '+cx+','+(cy+9)+' '+(cx-9)+','+cy+'" fill="'+c.bg+'" stroke="'+c.border+'" stroke-width="1"/>';
    }

    var x1 = X0 + r.s * W + 2;
    var barW = (r.e - r.s + 1) * W - 4;
    var op = r.dim ? ' opacity="0.45"' : '';
    return labelEl + '<rect x="'+x1+'" y="'+y+'" width="'+barW+'" height="'+H+'" rx="4" fill="'+c.bg+'" stroke="'+c.border+'" stroke-width="0.5"'+op+'/>';
  }).join('');

  return `
    ${tag('gray','CRONOGRAMA DA PESQUISA')}
    <h2>Cronograma</h2>
    <svg viewBox="0 0 700 ${svgH}" style="width:100%;max-width:680px">
      ${gridLines}
      ${semLabels}
      ${bars}
    </svg>
  `;
}

  slideTitle,             // 0  — slide de título

// ── Infraestrutura de navegação ──────────────────────────────────────────────
var MAX       = SLIDES.length - 1;
var step      = 0;
var slideEl   = document.getElementById('slide');
var pillsEl   = document.getElementById('pills');
var counterEl = document.getElementById('counter');
var hintEl    = document.getElementById('hint');

for (var i = 0; i <= MAX; i++) {
  var d = document.createElement('div');
  d.className = 'pill';
  d.dataset.i = i;
  d.addEventListener('click', function(e) { e.stopPropagation(); goTo(+this.dataset.i); });
  pillsEl.appendChild(d);
}

function goTo(n) {
  step = Math.max(0, Math.min(n, MAX));
  history.replaceState(null, '', '#' + step);
  render();
}

var ytPlayer = null;
var ytReady  = false;

function onYouTubeIframeAPIReady() {
  ytReady = true;
  if (document.getElementById('yt-player')) initYT();
}

function initYT() {
  ytPlayer = new YT.Player('yt-player', {
    width: '720', height: '390',
    videoId: 'pQhbhpU9Wrg',
    playerVars: { rel: 0, modestbranding: 1, playsinline: 1 }
  });
}

function render() {
  if (ytPlayer && typeof ytPlayer.stopVideo === 'function') {
    ytPlayer.stopVideo();
    ytPlayer.destroy();
    ytPlayer = null;
  }

  slideEl.innerHTML = SLIDES[step]();
  slideEl.style.animation = 'none'; slideEl.offsetHeight; slideEl.style.animation = 'fadeIn .35s ease';

  var pills = pillsEl.children;
  for (var i = 0; i <= MAX; i++) {
    pills[i].style.width      = step === i ? '20px' : '6px';
    pills[i].style.background = i <= step ? (step === i ? '#534AB7' : 'rgba(83,74,183,0.25)') : '#d3d1c7';
  }

  counterEl.textContent = step + '/' + MAX;
  hintEl.style.display  = step === 0 ? '' : 'none';

  document.getElementById('progress-bar').style.width = (step / MAX * 100) + '%';
  document.getElementById('slide-number').textContent = (step + 1) + ' / ' + (MAX + 1);

  if (document.getElementById('yt-player')) {
    if (ytReady) initYT(); // API já carregada
    // senão, onYouTubeIframeAPIReady() chamará initYT() quando pronta
  }
}

// ── Overlays: grade (G) e atalhos (?) ───────────────────────────────────────
var gridOpen = false, shortcutsOpen = false;

function buildGrid() {
  var gv = document.getElementById('grid-view');
  gv.innerHTML = '';
  for (var i = 0; i <= MAX; i++) {
    var cell = document.createElement('div');
    cell.className = 'gc' + (i === step ? ' active' : '');
    cell.innerHTML = `<div style="font-weight:600;font-size:10px;color:#534AB7;margin-bottom:3px">${i+1}</div><div>${TITLES[i]}</div>`;
    (function(idx) {
      cell.addEventListener('click', function(e) { e.stopPropagation(); goTo(idx); toggleGrid(); });
    })(i);
    gv.appendChild(cell);
  }
}
function toggleGrid() {
  var gv = document.getElementById('grid-view');
  gridOpen = !gridOpen;
  if (gridOpen) { buildGrid(); gv.style.display = 'grid'; if (shortcutsOpen) toggleShortcuts(); }
  else { gv.style.display = 'none'; }
}
function toggleShortcuts() {
  var so = document.getElementById('shortcuts-overlay');
  shortcutsOpen = !shortcutsOpen;
  so.style.display = shortcutsOpen ? 'flex' : 'none';
  if (shortcutsOpen && gridOpen) toggleGrid();
}
function closeOverlays() {
  if (gridOpen) toggleGrid();
  if (shortcutsOpen) toggleShortcuts();
}

// stopPropagation: cliques nos overlays não disparam goTo()
document.getElementById('grid-view').addEventListener('click', function(e) { e.stopPropagation(); });
document.getElementById('shortcuts-overlay').addEventListener('click', function(e) { e.stopPropagation(); toggleShortcuts(); });
document.querySelector('#shortcuts-overlay .so-box').addEventListener('click', function(e) { e.stopPropagation(); });

// ── Eventos de navegação ─────────────────────────────────────────────────────
document.body.addEventListener('click', function() {
  if (gridOpen || shortcutsOpen) { closeOverlays(); return; }
  goTo(step + 1);
});
document.body.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  if (gridOpen || shortcutsOpen) { closeOverlays(); return; }
  goTo(step - 1);
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape')              { closeOverlays(); return; }
  if (e.key === 'g' || e.key === 'G')  { e.preventDefault(); toggleGrid(); return; }
  if (e.key === '?')                   { e.preventDefault(); toggleShortcuts(); return; }
  if (gridOpen || shortcutsOpen) return;
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); goTo(step + 1); }
  if (e.key === 'ArrowLeft'  || e.key === 'Backspace')              { e.preventDefault(); goTo(step - 1); }
  if (e.key === 'r' || e.key === 'R') goTo(0);
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

// ── Escalonamento e inicialização ────────────────────────────────────────────
function scaleWrap() {
  var w = document.querySelector('.wrap');
  var s = Math.min(window.innerWidth / 960, window.innerHeight / 540) * 0.97;
  w.style.transform = 'scale(' + s + ')';
}
window.addEventListener('resize', scaleWrap);
scaleWrap();
var hashSlide = parseInt(window.location.hash.replace('#', ''), 10);
if (!isNaN(hashSlide)) step = Math.max(0, Math.min(hashSlide, MAX));
render();

</script>
